let selectedDay = 0;
const selected = {};
allDays.forEach(d => { selected[d.date] = new Set(); });

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = allDays.map((d,i) => {
    const hasSel = selected[d.date].size > 0;
    return `<div class="day-tab ${i===selectedDay?'active':''} ${hasSel?'has-sel':''}" onclick="switchDay(${i})">${d.label}</div>`;
  }).join('');
}

function renderMain() {
  document.getElementById('mainArea').innerHTML = allDays.map((day,di) => {
    const cards = day.matches.map((m,mi) => {
      const sel = selected[day.date].has(mi);
      return `<div class="match-card ${sel?'selected':''}" onclick="toggleMatch('${day.date}',${mi},${di})">
        <div class="check-box">${sel?'✓':''}</div>
        <div class="teams">
          <div class="team-side home"><span class="flag">${m.homef}</span><span class="tname">${m.home}</span></div>
          <div class="vs-pill">VS</div>
          <div class="team-side away"><span class="flag">${m.awayf}</span><span class="tname">${m.away}</span></div>
        </div>
        <div class="time-pill">${m.time}</div>
      </div>`;
    }).join('');
    return `<div class="day-panel ${di===selectedDay?'active':''}" id="panel-${di}">
      <div class="day-info">
        <span class="day-info-date">📅 ${day.date}</span>
        <span class="day-info-dot">•</span>
        <span class="day-info-round">${day.round}</span>
      </div>${cards}</div>`;
  }).join('');
}

function switchDay(i) {
  selectedDay = i;
  renderTabs();
  document.querySelectorAll('.day-panel').forEach((p,pi) => p.classList.toggle('active', pi===i));
}

function toggleMatch(date, mi, di) {
  if (selected[date].has(mi)) selected[date].delete(mi);
  else selected[date].add(mi);
  const cards = document.getElementById(`panel-${di}`).querySelectorAll('.match-card');
  const sel = selected[date].has(mi);
  cards[mi].classList.toggle('selected', sel);
  cards[mi].querySelector('.check-box').textContent = sel ? '✓' : '';
  renderTabs();
}

function resetDay() {
  selected[allDays[selectedDay].date].clear();
  renderMain(); renderTabs();
}

function showPreview() {
  const daysWithGames = allDays.filter(d => selected[d.date].size > 0);
  if (!daysWithGames.length) { alert('اختر مباراة واحدة على الأقل!'); return; }

  let matchesHtml = '';
  daysWithGames.forEach(day => {
    const sel = [...selected[day.date]].sort((a,b)=>a-b).map(mi => day.matches[mi]);
    if (daysWithGames.length > 1)
      matchesHtml += `<div class="sc-date-divider">📅 ${day.date}</div>`;
    sel.forEach(m => {
      matchesHtml += `<div class="sc-match">
        <div class="sc-team home"><span class="sc-flag">${m.homef}</span><span class="sc-tname">${m.home}</span></div>
        <span class="sc-vs">vs</span>
        <div class="sc-team away"><span class="sc-flag">${m.awayf}</span><span class="sc-tname">${m.away}</span></div>
        <div class="sc-time">${m.time}</div>

  const rounds = [...new Set(daysWithGames.map(d => d.round))].join(' | ');
  const dateLabel = daysWithGames.length === 1
    ? `📅 ${daysWithGames[0].date}`

  document.getElementById('shareCardContent').innerHTML = `

      <div class="sc-header-row">

        <span class="sc-trophy">🏆</span>
      </div>
      <div class="sc-round-badge">⚽ ${rounds} ⚽</div>
      <div class="sc-date-line">${dateLabel}</div>
    </div>
    <div class="sc-venue">
      <div class="sc-venue-name">🏛 مبنى بلدية بدبا 🏛</div>
      <div class="sc-venue-sub">سنبث المباريات التالية — تعال وشجّع معنا!</div>
    </div>
    <div class="sc-matches">${matchesHtml}</div>
    <div class="sc-food">
      <div class="sc-food-header">🍽 متوفر للبيع خلال المباريات</div>
      <div class="sc-food-items">
        <div class="sc-food-item"><div class="sc-food-icon">💧</div><div class="sc-food-label">مياه</div><div class="sc-food-desc">مياه معدنية باردة</div></div>
        <div class="sc-food-item"><div class="sc-food-icon">🥤</div><div class="sc-food-label">مشروبات</div><div class="sc-food-desc">مشروبات غازية</div></div>
        <div class="sc-food-item"><div class="sc-food-icon">🍔</div><div class="sc-food-label">أكل وسناكس</div><div class="sc-food-desc">وجبات وسناكس</div></div>
      </div>
    </div>
    <div class="sc-footer">
      <div class="sc-stars">⭐ ⭐ ⭐ ⭐ ⭐</div>
      <div class="sc-tagline">⚽ تعال وشجّع مع الأصحاب! ⚽</div>
      <div class="sc-sub">مبنى بلدية بدبا • كأس العالم FIFA 2026</div>
    </div>`;

  document.getElementById('previewOverlay').classList.add('show');
  document.getElementById('previewOverlay').scrollTop = 0;
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('show');
}
