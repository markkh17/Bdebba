// ============================================================
// STATE
// ============================================================
let selectedDay = 0;
// selected[dateStr] = Set of match indices
const selected = {};
allDays.forEach(d => { selected[d.date] = new Set(); });

// ============================================================
// RENDER TABS
// ============================================================
function renderTabs() {
  const wrap = document.getElementById('dayTabs');
  wrap.innerHTML = allDays.map((d, i) => {
    const hasSel = selected[d.date].size > 0;
    return `<div class="day-tab ${i === selectedDay ? 'active' : ''} ${hasSel ? 'has-selected' : ''}"
      onclick="switchDay(${i})">${d.label}</div>`;
  }).join('');
}

// ============================================================
// RENDER MAIN
// ============================================================
function renderMain() {
  const wrap = document.getElementById('mainArea');
  wrap.innerHTML = allDays.map((day, di) => {
    const matchesHtml = day.matches.map((m, mi) => {
      const isSel = selected[day.date].has(mi);
      return `<div class="match-card ${isSel ? 'selected' : ''}" onclick="toggleMatch('${day.date}', ${mi}, ${di})">
        <div class="check-box">${isSel ? '✓' : ''}</div>
        <div class="teams">
          <div class="team-side home">
            <span class="flag">${m.homef}</span>
            <span class="tname">${m.home}</span>
          </div>
          <div class="vs-badge">vs</div>
          <div class="team-side away">
            <span class="flag">${m.awayf}</span>
            <span class="tname">${m.away}</span>
          </div>
        </div>
        <div class="time-badge">${m.time}</div>
      </div>`;
    }).join('');
    return `<div class="day-panel ${di === selectedDay ? 'active' : ''}" id="panel-${di}">
      <div style="margin-bottom:10px;font-size:11px;color:rgba(255,215,0,0.7);letter-spacing:1px;">
        📅 ${day.date} &nbsp;•&nbsp; ${day.round}
      </div>
      ${matchesHtml}
    </div>`;
  }).join('');
}

// ============================================================
// ACTIONS
// ============================================================
function switchDay(i) {
  selectedDay = i;
  renderTabs();
  document.querySelectorAll('.day-panel').forEach((p, pi) => {
    p.classList.toggle('active', pi === i);
  });
}

function toggleMatch(date, mi, di) {
  if (selected[date].has(mi)) selected[date].delete(mi);
  else selected[date].add(mi);
  // update card
  const panel = document.getElementById(`panel-${di}`);
  const cards = panel.querySelectorAll('.match-card');
  cards[mi].classList.toggle('selected', selected[date].has(mi));
  cards[mi].querySelector('.check-box').textContent = selected[date].has(mi) ? '✓' : '';
  renderTabs();
}

function resetDay() {
  const day = allDays[selectedDay];
  selected[day.date].clear();
  renderMain();
  renderTabs();
}

// ============================================================
// PREVIEW
// ============================================================
function showPreview() {
  // Collect all days that have selections
  const daysWithGames = allDays.filter(d => selected[d.date].size > 0);

  if (daysWithGames.length === 0) {
    alert('اختر مباراة واحدة على الأقل أولاً!');
    return;
  }

  // Build share card content
  let matchesHtml = '';
  daysWithGames.forEach(day => {
    const selMatches = [...selected[day.date]].sort().map(mi => day.matches[mi]);
    // date sub-header if multiple days
    if (daysWithGames.length > 1) {
      matchesHtml += `<div style="font-size:9px;color:#FFD700;margin:8px 0 4px;font-weight:700;letter-spacing:1px;">📅 ${day.date}</div>`;
    }
    selMatches.forEach(m => {
      matchesHtml += `<div class="sc-match">
        <div class="sc-team home"><span class="sc-flag">${m.homef}</span><span class="sc-tname">${m.home}</span></div>
        <span class="sc-vs">vs</span>
        <div class="sc-team away"><span class="sc-flag">${m.awayf}</span><span class="sc-tname">${m.away}</span></div>
        <div class="sc-time">${m.time}</div>
      </div>`;
    });
  });

  // Determine round label
  const rounds = [...new Set(daysWithGames.map(d => d.round))];
  const roundLabel = rounds.join(' | ');

  // Date label
  const dateLabel = daysWithGames.length === 1
    ? `📅 ${daysWithGames[0].date}`
    : `📅 ${daysWithGames[0].date} – ${daysWithGames[daysWithGames.length-1].date}`;

  document.getElementById('shareCard').innerHTML = `
    <div class="sc-header">
      <div style="position:absolute;top:8px;left:10px;background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,215,0,0.5);border-radius:5px;padding:2px 6px;text-align:center;">
        <div style="font-size:8px;font-weight:900;color:#FFD700;letter-spacing:2px;">FIFA</div>
        <div style="font-size:12px;font-weight:900;color:#fff;line-height:1;">2026</div>
      </div>
      <div class="sc-header-row">
        <span class="sc-trophy">🏆</span>
        <div><div class="sc-h1">كأس العالم 2026</div><div class="sc-h2">FIFA WORLD CUP 2026</div></div>
        <span class="sc-trophy">🏆</span>
      </div>
      <div class="sc-badge">⚽ ${roundLabel} ⚽</div>
      <div style="font-size:8px;color:rgba(255,255,255,0.7);margin-top:3px;">${dateLabel}</div>
    </div>
    <div class="sc-venue">
      <div class="sc-venue-name">🏛 مبنى بلدية بدبا 🏛</div>
      <div class="sc-venue-sub">سنبث المباريات التالية اليوم</div>
    </div>
    <div class="sc-matches">${matchesHtml}</div>
    <div class="sc-amenities">
      <div class="sc-am-title">🍽 متوفر للبيع خلال المباريات 🍽</div>
      <div class="sc-am-item"><span class="sc-am-icon">💧</span><span>مياه</span></div>
      <div class="sc-am-item"><span class="sc-am-icon">🥤</span><span>مشروبات غازية</span></div>
      <div class="sc-am-item"><span class="sc-am-icon">🍔</span><span>أكل وسناكس</span></div>
    </div>
    <div class="sc-footer">
      <div class="sc-stars">⭐ ⭐ ⭐ ⭐ ⭐</div>
      <div class="sc-tagline">⚽ تعال وشجّع مع الأصحاب! ⚽</div>
      <div class="sc-sub">مبنى بلدية بدبا • كأس العالم FIFA 2026</div>
    </div>`;

  document.getElementById('previewOverlay').classList.add('show');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('show');
}

// INIT

renderMain();
</script>
